<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tablas</title>
</head>
<body>
    <!--Tablas-->
    <table border="2">
        <thead>
            <tr>
                <th>Nombre</th>
                <th>Apellido</th>
                <th>Edad</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Michael</td>
                <td>Zarza</td>
                <td>21</td>
            </tr>
            <tr>
                <td>Luciano</td>
                <td>Gonzalez</td>
            </tr>
            <tr>
                <td colspan="2" align="center">Diego</td>
                <td>23</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td></td>
                <td><b>Total</b></td>
                <td><b>67</b></td>
            </tr>
        </tfoot>
    </table>

    <table border="3">
        <tbody>
            <tr>
                <td>Dato 1</td>
                <td>Dato 2</td>
                <td rowspan="3">Dato 3</td>
                <td>Dato 4</td>
            </tr>
            <tr>
                <td>Dato 5</td>
                <td>Dato 6</td>

                <td>Dato 8</td>
            </tr>
            <tr>
            
            </tr>
        </tbody>

    </table>
</body>
</html>
