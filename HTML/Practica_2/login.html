<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>
    <h1>Inicio de Sesión</h1>
    <p>Para iniciar sesión, completá los siguientes campos con tus datos registrados y presioná el boton "Iniciar Sesión"</p>
    <hr>
    <form action="" method="" target="_blank"></form>
        <div>
            <label for="Usuario">Usuario</label>
            <input type="text" id="UsuarioInput" name="Usuario" placeholder="Usuario">
        </div>
        <div>
            <label for="ContraseñaInput">Contraseña</label>
            <input type="password" id="ContraseñaInput" name="Contraseña" placeholder="Contraseña" maxlength="12" minlength="4">
        </div>
        <div>
            <label for="CheckboxInput">Recordarme</label>
            <input type="checkbox" id="CheckboxInput" name="CheckboxInput">
        </div>
        <div>
            <button type="submit">Iniciar Sesión</button>
        </div>
    </table>

    
</body>
</html>
