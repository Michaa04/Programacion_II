<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prueba 4</title>
</head>
<body>
    <form action="#" method="" target="_blank" >
            <tr>
                <hr>
                <td>Input</td>
                <td>
                    <label for="txtInput">Titulo del campo</label>
                    <input type="text" id="txtInput" name="txtInput" value="" placeholder="Hola Mundo" 
                    required disabled readonly size="100px" maxlength="" autocomplete="">
                </td>
                <hr>
                
            </tr>
            <tr>
                <hr>
                <td>
                    <label for="RadioInput">Selecciona una opcion</label>
                    <input type="radio" name="RadioInput" id="RadioInput">
                    <input type="radio" name="RadioInput2" id="RadioInput2">

                </td>
                <hr>
                <td>
                    <label for="SelectInput">Selecciona una opcion</label>
                    <select name="SelectInput" id="">
                        <option value="" selected disabled> Seleccione una opcion</option>
                        <option value="1">Opcion1</option>
                        <option value="2">Opcion2</option>
                        <option value="3">Opcion3</option>
                    </select>

                </td>
                <hr>
                <td>
                    <label for="NumberInput">Numero</label>
                    <input type="number" name="NumberInput" id="NumberInput" placeholder="Numero">
                </td>
                <hr>
                <td>
                    <label for="Password">Contraseña</label>
                    <input type="password" name="PasswordInput" id="PasswordINput">
                </td>
                <hr>
                <td>
                    <label for="DateInput">Fecha de nacimiento</label>
                    <input type="date" name="DateInput" id="DateInput">
                </td>
                <hr>
                <td>
                    <label for="EmailInput">Correo Electronico</label>
                    <input type="email" name="EmailInput" id="EmailInput" placeholder="Email">
                </td>
                <hr>
                <td>
                    <label for=""></label>
                    <textarea name="mensaje" id="" rows="10" cols="30">
                    Escribir un mensaje aqui 
                    </textarea> 
                </td>
                <hr>
                <td>
                    <label for="ColorInput">Color</label>
                    <input type="color" name="ColorInput" id="ColorInput">
                </td>
                <hr>
                <td>
                    <label for="FileInput">Subir Archivo</label>
                    <input type="file" name="FileInput" id="FileInput" placeholder="Seleccionar un archivo">
                </td>
                <hr>
                <td>
                    <label for="TelInput">Telefono</label>
                    <input type="tel" name="TelInput" id="TelInput" placeholder="Telefono">
                </td>
                <hr>
                <td>
                    <button>Enviar</button>
                    <button>Reset</button>
                </td>
                
    </form>
</body>
</html>
